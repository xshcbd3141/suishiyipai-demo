const PHONE = '13800000000';
const PWD = '123456';
const SALT = 'suishiyipai_salt';

function log(msg) { document.getElementById('log').innerHTML += msg + '\n'; }

async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode(password + SALT);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ===== 30天日期生成 =====
function getDates(days) {
  const dates = [];
  const now = new Date();
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    dates.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'));
  }
  return dates;
}

function buildMeal(mealType, foods, dateStr, idx) {
  const allFoods = foods.map(f => {
    const base = getFoodBase(f.food);
    const weight = f.weight || randInt(100, 200);
    const ratio = weight / 100;
    return {
      name: f.food.replace(/_.*/, '').replace('_大', ''),
      weight: weight,
      cal: Math.round(base[0] * ratio),
      pro: Math.round(base[1] * ratio * 10) / 10,
      fat: Math.round(base[2] * ratio * 10) / 10,
      carb: Math.round(base[3] * ratio * 10) / 10,
      category: base[4],
      confidence: randInt(75, 98),
    };
  });

  const totalCal = allFoods.reduce((s, f) => s + f.cal, 0);
  const totalPro = Math.round(allFoods.reduce((s, f) => s + f.pro, 0) * 10) / 10;
  const totalFat = Math.round(allFoods.reduce((s, f) => s + f.fat, 0) * 10) / 10;
  const totalCarb = Math.round(allFoods.reduce((s, f) => s + f.carb, 0) * 10) / 10;

  const hour = mealType === 'breakfast' ? randInt(7, 9) : mealType === 'lunch' ? randInt(11, 13) : mealType === 'dinner' ? randInt(17, 20) : randInt(14, 16);
  const min = randInt(0, 59);
  const time = String(hour).padStart(2, '0') + ':' + String(min).padStart(2, '0');

  return {
    mealType,
    foods: allFoods,
    nutrition: { cal: totalCal, pro: totalPro, fat: totalFat, carb: totalCarb },
    model: 'Qwen3-VL-30B-A3B-Instruct',
    time,
  };
}

// ===== 生成体重数据（30天递减趋势） =====
function generateWeightLog(dates) {
  const log = [];
  let w = 78.0;
  // 前15天波动下降，后15天加速下降
  for (let i = 0; i < dates.length; i++) {
    // 模拟每日波动 + 整体下降趋势
    const trend = -(i / dates.length) * 2.8; // 30天体重大约下降2.8kg
    const dailyFluctuation = (Math.random() - 0.4) * 0.6; // 日常波动-0.3到+0.3
    const weekendEffect = [0, 6].includes(new Date(dates[i]).getDay()) ? 0.3 : 0; // 周末重一点
    const cheatEffect = [6, 13, 20, 27].includes(i) ? 0.5 : 0; // 欺骗日后体重反弹
    const missingEffect = [0, 16, 24].includes(i) ? 0 : 0; // 无记录日没体重

    w = Math.round((78.0 + trend + dailyFluctuation + weekendEffect + cheatEffect) * 10) / 10;
    w = Math.max(74.5, Math.min(78.5, w));

    // 有几个无记录日不称体重
    if (![0, 16, 24].includes(i)) {
      log.push({ date: dates[i], weight: w });
    } else if (i > 0) {
      // 前一天加近似体重
      log.push({ date: dates[i], weight: Math.round((log[log.length-1].weight + 0.1) * 10) / 10 });
    }
  }
  return log;
}

// ===== 生成游戏数据 =====
function generateGameData(dates, meals) {
  let totalScore = 0;
  const history = [];
  let totalMeals = 0;
  let streak = 0;

  const mealDates = Object.keys(meals).sort();
  mealDates.forEach((date, idx) => {
    const dayMeals = meals[date] || [];
    totalMeals += dayMeals.length;
    const dayCal = dayMeals.reduce((s, m) => s + m.nutrition.cal, 0);
    if (dayCal < 50) return;

    let score = 10;
    if (dayCal >= 1640 && dayCal <= 2255) score += 20; // 80%-110% of 2050 target
    const mealTypes = new Set(dayMeals.map(m => m.mealType));
    if (mealTypes.size >= 3) score += 15;
    const hasVeggie = dayMeals.some(m => m.foods.some(f => (f.category || '').includes('蔬菜') || /菜/.test(f.name)));
    if (hasVeggie) score += 5;

    // Streak check
    if (idx > 0) {
      const prevDate = mealDates[idx - 1];
      const expectedPrev = new Date(date);
      expectedPrev.setDate(expectedPrev.getDate() - 1);
      if (prevDate === expectedPrev.toISOString().split('T')[0]) {
        streak++;
      } else {
        streak = 1;
      }
    } else {
      streak = 1;
    }
    if (streak > 0 && streak % 7 === 0) score += 50;

    totalScore += score;
    history.push({ date, score, streak });
  });

  return {
    totalScore,
    totalMeals,
    history,
    streaks: [3, 7, 14, 21],
    achievements: ['first_log', 'streak_7', 'meals_100', 'veggie_70', 'streak_14'],
    veggiePct: 72,
    proCompliance: 88,
  };
}
